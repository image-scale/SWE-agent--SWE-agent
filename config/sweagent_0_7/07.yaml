agent:
  model:
    name: "gpt-4o"
  tools:
    parse_function:
      type: thought_action
    bundles:
      - path: tools/registry
      - path: tools/windowed
      - path: tools/submit
    env_variables:
      WINDOW: 100
  templates:
    system_template: |
      You are an autonomous programmer, and you're working directly in the command line with a special interface.
    instance_template: |
      We're currently solving the following issue within our repository. Here's the issue text:
      ISSUE:
      {{ problem_statement }}
    next_step_template: |
      {{ observation }}
      (Open file: {{ open_file }})
      (Current directory: {{ working_dir }})
      bash-$
    next_step_no_output_template: |
      Your command ran successfully and did not produce any output.
      (Open file: {{ open_file }})
      (Current directory: {{ working_dir }})
      bash-$
    demonstration:
      - path: demos/marshmallow.traj
